<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claire</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url("https://fonts.googleapis.com/css?family=DM+Sans:400,500|Jost:400,500,600&display=swap");

    * { box-sizing: border-box; }

    body {
      color: #2b2c48;
      font-family: "Jost", sans-serif;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
      margin: 0;
    }

    .card {
      max-width: 340px;
      width: 100%;
      margin: auto;
      overflow-y: auto;
      position: relative;
      z-index: 1;
      overflow-x: hidden;
      background-color: cyan;
      display: flex;
      transition: 0.3s;
      flex-direction: column;
      border-radius: 10px;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.2);
    }

    .card[data-state="#about"]      { height: 450px; }
    .card[data-state="#contact"]    { height: 430px; }
    .card[data-state="#experience"] { height: 550px; }
    .card[data-state="#about"] .card-main { padding-top: 0; }

    .card.is-active .card-header   { height: 80px; }
    .card.is-active .card-cover    { height: 100px; top: -50px; }
    .card.is-active .card-avatar   { transform: none; left: 20px; width: 50px; height: 50px; bottom: 10px; }
    .card.is-active .card-fullname,
    .card.is-active .card-jobtitle { left: 86px; transform: none; }
    .card.is-active .card-fullname { bottom: 18px; font-size: 19px; }
    .card.is-active .card-jobtitle { bottom: 16px; letter-spacing: 1px; font-size: 10px; }

    .card-header {
      position: relative; display: flex; height: 200px;
      flex-shrink: 0; width: 100%; transition: 0.3s;
    }
    .card-header * { transition: 0.3s; }

    .card-cover {
      width: 100%; height: 160px; position: absolute; top: -20%; left: 0;
      will-change: top; background-size: cover; background-position: center;
      filter: blur(30px); transform: scale(1.2); transition: 0.5s;
    }

    .card-avatar {
      width: 100px; height: 100px; box-shadow: 0 8px 8px rgba(0,0,0,0.2);
      border-radius: 50%; object-position: center; object-fit: cover;
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(-64px);
    }

    .card-fullname {
      position: absolute; bottom: 0; font-size: 22px; font-weight: 700;
      text-align: center; white-space: nowrap;
      transform: translateY(-10px) translateX(-50%); left: 50%;
    }

    .card-jobtitle {
      position: absolute; bottom: 0; font-size: 11px; white-space: nowrap;
      font-weight: 500; opacity: 0.7; text-transform: uppercase;
      letter-spacing: 1.5px; margin: 0; left: 50%;
      transform: translateX(-50%) translateY(-7px);
    }

    .card-main {
      position: relative; flex: 1; display: flex;
      padding-top: 10px; flex-direction: column; min-height: 0;
    }

    .card-subtitle { font-weight: 700; font-size: 13px; margin-bottom: 8px; }
    .card-content  { padding: 20px; }

    /* FIX utama: warna teks desc gelap supaya keliatan di cyan */
    .card-desc {
      line-height: 1.6;
      color: #1a3a3a;
      font-size: 14px;
      margin: 0 0 8px 0;
      font-weight: 400;
      font-family: "DM Sans", sans-serif;
    }

    .card-social {
      display: flex; align-items: center;
      padding: 0 20px; margin-bottom: 30px;
    }
    .card-social a {
      height: 32px; width: 32px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      transition: 0.3s; background-color: rgba(135,206,250,0.5);
      margin-right: 10px; font-size: 16px; text-decoration: none;
    }
    .card-social a:last-child { margin-right: 0; }
    .card-social a i       { color: #1a5276; transition: 0.3s; }
    .card-social a:hover i { color: #2e86c1; }

    .card-buttons {
      display: flex; background-color: #00FFFF;
      margin-top: auto; position: sticky; bottom: 0; left: 0; flex-shrink: 0;
    }
    .card-buttons button {
      flex: 1 1 auto; user-select: none; background: transparent;
      font-size: 13px; border: 0; padding: 15px 5px; cursor: pointer;
      color: #008b8b; transition: 0.3s; font-family: "Jost", sans-serif;
      font-weight: 500; outline: 0; border-bottom: 3px solid transparent;
    }
    .card-buttons button.is-active,
    .card-buttons button:hover {
      color: #2b2c48; border-bottom: 3px solid #8a84ff;
      background: linear-gradient(to bottom,
        rgba(127,199,231,0) 0%, rgba(100,149,237,0.4) 44%, rgba(65,105,225,0.4) 100%);
    }

    .card-section           { display: none; }
    .card-section.is-active { display: block; animation: fadeIn 0.6s both; }

    @keyframes fadeIn {
      0%   { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .card-timeline { margin-top: 30px; position: relative; }
    .card-timeline::after {
      content: "";
      background: linear-gradient(to top, rgba(134,214,243,0) 0%, #516acc 100%);
      left: 42px; width: 2px; top: 0; height: 100%; position: absolute;
    }

    .card-item {
      position: relative; padding-left: 60px;
      padding-right: 20px; padding-bottom: 30px; z-index: 1;
    }
    .card-item:last-child { padding-bottom: 5px; }
    .card-item::after {
      content: attr(data-year); position: absolute; top: 0; left: 37px;
      width: 8px; height: 8px; line-height: 0.6; border: 2px solid #fff;
      font-size: 11px; text-indent: -35px; border-radius: 50%;
      color: rgba(65,105,225,1);
      background: linear-gradient(to bottom, #a0aee3 30%, #516acc 100%);
    }

    .card-item-title { font-weight: 500; font-size: 14px; margin-bottom: 5px; color: #2b2c48; }
    .card-item-desc  { font-size: 13px; color: #4a4a5a; line-height: 1.5; font-family: "DM Sans", sans-serif; }

    .card-contact-wrapper { margin-top: 20px; }
    .card-contact {
      display: flex; align-items: center; font-size: 13px; color: #4a4a5a;
      font-family: "DM Sans", sans-serif; line-height: 1.6;
      cursor: pointer; word-break: break-all;
    }
    .card-contact + .card-contact { margin-top: 16px; }
    .card-contact svg {
      flex-shrink: 0; width: 30px; min-height: 34px; margin-right: 12px;
      transition: 0.3s; padding-right: 12px; border-right: 1px solid #b0d0d0;
    }

    .contact-me {
      border: 0; outline: none;
      background: linear-gradient(to right, rgba(238,130,238,1) 0%, rgba(81,106,204,0.8) 96%);
      box-shadow: 0 4px 6px rgba(0,0,0,0.15); color: #fff;
      padding: 12px 16px; width: 100%; border-radius: 5px;
      margin-top: 25px; cursor: pointer; font-size: 14px;
      font-weight: 500; font-family: "Jost", sans-serif; transition: 0.3s;
    }
    .contact-me:hover { opacity: 0.85; }

    .footer {
      width: 100%; height: 50px; padding-left: 10px;
      line-height: 50px; color: #fff;
    }
  </style>
</head>

<body>
  <div class="card" data-state="#about">
    <div class="card-header">
      <div class="card-cover" id="card-cover"></div>
      <img class="card-avatar" id="card-avatar" alt="avatar" />
      <h1 class="card-fullname" id="card-fullname"></h1>
      <h2 class="card-jobtitle" id="card-jobtitle"></h2>
    </div>

    <div class="card-main">
      <!-- ABOUT -->
      <div class="card-section is-active" id="about">
        <div class="card-content">
          <div class="card-subtitle" id="card-username"></div>
          <p class="card-desc" id="card-quote"></p>
          <p class="card-desc" id="card-bio"></p>
        </div>
        <div class="card-social" id="card-social"></div>
      </div>

      <!-- EXPERIENCE -->
      <div class="card-section" id="experience">
        <div class="card-content">
          <div class="card-subtitle" id="progress-title"></div>
          <div class="card-timeline" id="card-timeline"></div>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="card-section" id="contact">
        <div class="card-content">
          <div class="card-subtitle">CONTACT</div>
          <div class="card-contact-wrapper">
            <div class="card-contact">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <span id="contact-location"></span>
            </div>
            <div class="card-contact">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 010.17 1.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.06 6.06l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
              </svg>
              <span id="contact-phone"></span>
            </div>
            <div class="card-contact">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <path d="M22 6l-10 7L2 6"/>
              </svg>
              <span id="contact-email"></span>
            </div>
            <a id="contact-btn-wrap" target="_blank">
              <button class="contact-me">Contact Me</button>
            </a>
          </div>
        </div>
      </div>

      <div class="card-buttons">
        <button data-section="#about" class="is-active">HOME</button>
        <button data-section="#experience">PROGRESS</button>
        <button data-section="#contact">CONTACT</button>
      </div>
    </div>
  </div>

  <audio id="audio" style="display:none" loop>
    <source id="audio-src" type="audio/mpeg">
  </audio>

  <div class="footer">
    <p style="text-align:center;color:white;margin:0;" id="footer-text"></p>
  </div>

  <script src="settings.js"></script>
  <script>
    // ── Apply SETTINGS ───────────────────────────────────────────
    document.body.style.backgroundImage            = `url('${SETTINGS.backgroundUrl}')`;
    document.getElementById('card-cover').style.backgroundImage = `url('${SETTINGS.coverUrl}')`;
    document.getElementById('card-avatar').src             = SETTINGS.avatarUrl;
    document.getElementById('card-fullname').textContent   = SETTINGS.name;
    document.getElementById('card-jobtitle').textContent   = SETTINGS.jobtitle;
    document.getElementById('card-username').textContent   = SETTINGS.username;
    document.getElementById('card-quote').textContent      = `"${SETTINGS.quote}"`;
    document.getElementById('card-bio').textContent        = SETTINGS.bio;
    document.getElementById('progress-title').textContent  = SETTINGS.progressTitle;
    document.getElementById('contact-location').textContent = SETTINGS.location;
    document.getElementById('contact-phone').textContent    = SETTINGS.phone;
    document.getElementById('contact-email').textContent    = SETTINGS.email;
    document.getElementById('contact-btn-wrap').href        = SETTINGS.whatsappUrl;
    document.getElementById('audio-src').src               = SETTINGS.audioUrl;
    document.getElementById('footer-text').textContent     = SETTINGS.footerText;

    // ── Socials ──────────────────────────────────────────────────
    const socialContainer = document.getElementById('card-social');
    SETTINGS.socials.forEach(s => {
      const a = document.createElement('a');
      a.href = s.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `<i class="${s.icon}"></i>`;
      socialContainer.appendChild(a);
    });

    // ── Timeline ─────────────────────────────────────────────────
    const timeline = document.getElementById('card-timeline');
    SETTINGS.timeline.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card-item';
      div.setAttribute('data-year', item.year);
      div.innerHTML = `
        <div class="card-item-title">${item.title}</div>
        <div class="card-item-desc">${item.desc}</div>
      `;
      timeline.appendChild(div);
    });

    // ── Tabs (stopPropagation biar audio/fullscreen gak ke-trigger) ──
    const tabButtons = document.querySelectorAll('.card-buttons button');
    const sections   = document.querySelectorAll('.card-section');
    const card       = document.querySelector('.card');

    tabButtons.forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const targetSection = e.target.getAttribute('data-section');
        const section = document.querySelector(targetSection);

        targetSection !== '#about'
          ? card.classList.add('is-active')
          : card.classList.remove('is-active');

        card.setAttribute('data-state', targetSection);
        sections.forEach(s => s.classList.remove('is-active'));
        tabButtons.forEach(b => b.classList.remove('is-active'));
        e.target.classList.add('is-active');
        section.classList.add('is-active');
      });
    });

    // ── Audio + Fullscreen ───────────────────────────────────────
    let audioStarted = false;
    document.body.addEventListener('click', () => {
      if (!audioStarted) {
        document.getElementById('audio').play().catch(() => {});
        audioStarted = true;
      }
      const elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/gh/scottschiller/Snowstorm/snowstorm.js"></script>
</body>
</html>
